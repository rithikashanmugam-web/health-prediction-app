<!DOCTYPE html>
<html>

<head>

<title>Add Patient</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="container mt-4">

<h2>Add Patient</h2>

<form method="POST">

    <input
    type="text"
    name="name"
    placeholder="Full Name"
    class="form-control mb-2"
    required>

    <input
    type="date"
    name="dob"
    class="form-control mb-2"
    required>

    <input
    type="email"
    name="email"
    placeholder="Email"
    class="form-control mb-2"
    required>

    <input
    type="number"
    name="glucose"
    placeholder="Glucose"
    class="form-control mb-2"
    required>

    <input
    type="number"
    step="0.1"
    name="haemoglobin"
    placeholder="Haemoglobin"
    class="form-control mb-2"
    required>

    <input
    type="number"
    name="cholesterol"
    placeholder="Cholesterol"
    class="form-control mb-2"
    required>

    <button
    class="btn btn-success">

        Save

    </button>

</form>

</body>
</html>
