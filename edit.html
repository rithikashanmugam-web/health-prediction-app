<!DOCTYPE html>
<html>

<head>

<title>Edit Patient</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="container mt-4">

<h2>Edit Patient</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ patient[1] }}"
class="form-control mb-2"
required>

<input
type="date"
name="dob"
value="{{ patient[2] }}"
class="form-control mb-2"
required>

<input
type="email"
name="email"
value="{{ patient[3] }}"
class="form-control mb-2"
required>

<input
type="number"
name="glucose"
value="{{ patient[4] }}"
class="form-control mb-2"
required>

<input
type="number"
step="0.1"
name="haemoglobin"
value="{{ patient[5] }}"
class="form-control mb-2"
required>

<input
type="number"
name="cholesterol"
value="{{ patient[6] }}"
class="form-control mb-2"
required>

<button class="btn btn-success">

    Update

</button>

</form>

</body>
</html>
